env:
  mode: approach
  n_joints: 7
  goal_sample_margin_fraction: 0.05
  start_sample_margin_fraction: 0.10
  episode_length: 30
  observation:
    pos_err_scale_m: 0.75
    ori_err_scale_rad: 3.141592653589793
  reward:
    position_progress_weight: 8.0
    orientation_progress_weight: 0.0
    near_field_orientation_progress_weight: 0.0
    pre_near_goal_pos_threshold_m: 0.06
    near_goal_pos_threshold_m: 0.03
    near_goal_ori_threshold_rad: 0.35
    coarse_orientation_bonus_threshold_rad: 0.35
    use_orientation_gate: false
    pre_near_goal_bonus: 0.04
    near_goal_bonus: 0.18
    near_goal_bonus_decay: 0.45
    coarse_orientation_bonus: 0.0
    dwell_bonus: 0.05
    drift_penalty_weight: 2.0
    drift_penalty_escalation_start: 2
    drift_penalty_escalation_per_count: 0.75
    action_magnitude_weight: 0.002
    action_delta_weight: 0.004
    joint_limit_penalty_weight: 0.05
    success_bonus: 0.4
  termination:
    max_episode_steps: 30
    success_pos_threshold_m: 0.03
    success_ori_threshold_rad: 0.35
    success_dwell_steps: 2
    require_orientation: false
  curriculum:
    enabled: false
eval:
  suite_seed: 700001
  episodes: 20
  regression_tolerance_m: 0.01
training:
  checkpoint_freq: 20000
  n_envs: 16
  vec_env: subproc
  start_method: fork
  device: cuda
algorithms:
  ppo: {}
