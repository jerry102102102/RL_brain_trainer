env:
  mode: approach
  n_joints: 7
  goal_sample_margin_fraction: 0.05
  start_sample_margin_fraction: 0.10
  episode_length: 56
  observation:
    pos_err_scale_m: 0.75
    ori_err_scale_rad: 3.141592653589793
  reward:
    position_progress_weight: 6.2
    orientation_progress_weight: 0.85
    near_field_orientation_progress_weight: 8.0
    pre_near_goal_pos_threshold_m: 0.050
    near_goal_pos_threshold_m: 0.030
    near_goal_ori_threshold_rad: 1.00
    coarse_orientation_bonus_threshold_rad: 1.00
    orientation_milestone_thresholds_rad: [2.0, 1.5, 1.2, 1.0]
    orientation_milestone_bonuses: [0.04, 0.09, 0.16, 0.28]
    near_field_orientation_center_weight: 0.025
    use_orientation_gate: false
    pre_near_goal_bonus: 0.05
    near_goal_bonus: 0.18
    near_goal_bonus_decay: 0.45
    pre_near_to_near_progress_weight: 1.6
    coarse_orientation_bonus: 0.24
    handover_pos_threshold_m: 0.030
    handover_ori_threshold_rad: 1.00
    handover_bonus: 0.45
    handover_dwell_bonus: 0.18
    dwell_bonus: 0.12
    drift_penalty_weight: 3.0
    drift_penalty_escalation_start: 2
    drift_penalty_escalation_per_count: 0.65
    near_goal_leave_penalty: 0.12
    action_magnitude_weight: 0.003
    action_delta_weight: 0.006
    joint_limit_penalty_weight: 0.05
    success_bonus: 1.2
  termination:
    max_episode_steps: 56
    success_pos_threshold_m: 0.030
    success_ori_threshold_rad: 1.00
    success_dwell_steps: 2
    require_orientation: true
    terminate_on_success: true
  curriculum:
    enabled: false

eval:
  suite_seed: 700001
  episodes: 100
  regression_tolerance_m: 0.008

training:
  checkpoint_freq: 50000
  n_envs: 12
  vec_env: subproc
  start_method: fork
  device: cuda

algorithms:
  ppo:
    total_timesteps: 524288
    seed: 101
    learning_rate: 0.000012
    n_steps: 2048
    batch_size: 256
    n_epochs: 10
    gamma: 0.99
    gae_lambda: 0.95
    clip_range: 0.16
