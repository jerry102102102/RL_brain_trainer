env:
  mode: dock
  n_joints: 7
  action_delta_scale: 0.011
  dock_residual_action_limit: 0.11
  dock_delta_q_change_limit_scale: 0.08
  dock_dynamic_action_limit_near_pos_threshold_m: 0.005
  dock_dynamic_action_limit_far_pos_threshold_m: 0.009
  dock_dynamic_residual_action_limit_near: 0.11
  dock_dynamic_residual_action_limit_far: 0.045
  dock_dynamic_delta_q_change_limit_scale_near: 0.08
  dock_dynamic_delta_q_change_limit_scale_far: 0.03
  episode_length: 32

  dock_reward:
    position_progress_weight: 2.2
    orientation_progress_weight: 0.90
    stay_in_zone_bonus: 0.08
    dwell_bonus: 0.18
    leave_zone_penalty: 0.25
    drift_penalty_position_weight: 7.2
    drift_penalty_orientation_weight: 2.8
    action_magnitude_weight: 0.18
    action_delta_weight: 0.26
    joint_limit_penalty_weight: 0.05
    success_bonus: 0.25

    tight_pose_pos_threshold_m: 0.005
    tight_pose_ori_threshold_rad: 0.05
    tight_pose_bonus: 0.03
    tight_pose_dwell_bonus: 0.06
    strict_pose_leave_penalty: 2.5
    strict_center_reward_weight: 0.95
    strict_center_position_weight: 0.95
    strict_center_orientation_weight: 0.18
    strict_center_small_action_bonus_weight: 0.18
    strict_center_small_action_pos_radius_m: 0.0055
    strict_center_small_action_ori_radius_rad: 0.05
    strict_center_small_action_scale: 0.05
    strict_center_small_action_power: 3.0
    strict_zone_drift_penalty_multiplier: 1.9
    strict_zone_action_penalty_multiplier: 2.0

    convergence_position_radius_m: 0.012
    convergence_position_progress_weight: 6.4
    convergence_orientation_radius_rad: 1.80
    convergence_orientation_progress_weight: 1.40
    position_first_orientation_pos_threshold_m: 0.0075
    position_first_orientation_pre_scale: 0.45

    action_delta_violation_threshold: 0.03
    action_delta_violation_weight: 0.8
    delta_q_change_penalty_threshold: 0.001
    delta_q_change_penalty_weight: 0.6
    entry_action_penalty_near_pos_threshold_m: 0.005
    entry_action_penalty_far_pos_threshold_m: 0.009
    entry_action_penalty_near_multiplier: 1.0
    entry_action_penalty_far_multiplier: 2.8

  dock_reset:
    close_bucket_probability: 1.0
    close_bucket_min_pos_error_m: 0.0070
    close_bucket_max_pos_error_m: 0.0100
    close_bucket_max_ori_error_rad: 1.80
    handoff_state_probability: 0.0
    handoff_state_buffer_path: "/home/jerry/.openclaw/workspace/repos/personal/RL_brain_trainer/artifacts/kinematic_phase1/phase1b/handoff_state_buffer_oricoarse_001/handoff_state_buffer.json"
    handoff_state_max_position_error_m: 0.0085
    handoff_state_max_orientation_error_rad: 2.80
    handoff_state_max_action_l2: 0.22

  termination:
    max_episode_steps: 32
    success_pos_threshold_m: 0.005
    success_ori_threshold_rad: 0.05
    success_dwell_steps: 5
    require_orientation: true
    terminate_on_success: false

training:
  checkpoint_freq: 50000
  n_envs: 12
  vec_env: subproc
  start_method: fork
  device: cuda
  dock_reverse_curriculum:
    enabled: true
    window_episodes: 120
    stages:
      - name: anchor_hold
        min_episodes: 400
        window_episodes: 80
        success_rate_threshold: 0.85
        action_delta_scale: 0.0075
        dock_residual_action_limit: 0.07
        dock_delta_q_change_limit_scale: 0.05
        close_bucket_probability: 1.0
        close_bucket_min_pos_error_m: 0.0010
        close_bucket_max_pos_error_m: 0.0025
        close_bucket_max_ori_error_rad: 0.20
        close_init_q_noise: [0.0010, 0.0020, 0.0030, 0.0020, 0.0015, 0.0015, 0.0010]
        handoff_state_probability: 0.0
      - name: micro_capture
        min_episodes: 500
        window_episodes: 100
        success_rate_threshold: 0.80
        action_delta_scale: 0.0085
        dock_residual_action_limit: 0.08
        dock_delta_q_change_limit_scale: 0.06
        close_bucket_probability: 1.0
        close_bucket_min_pos_error_m: 0.0025
        close_bucket_max_pos_error_m: 0.0045
        close_bucket_max_ori_error_rad: 0.40
        close_init_q_noise: [0.0015, 0.0030, 0.0045, 0.0030, 0.0025, 0.0025, 0.0015]
        handoff_state_probability: 0.0
      - name: local_capture
        min_episodes: 600
        window_episodes: 100
        success_rate_threshold: 0.74
        action_delta_scale: 0.0095
        dock_residual_action_limit: 0.09
        dock_delta_q_change_limit_scale: 0.07
        close_bucket_probability: 1.0
        close_bucket_min_pos_error_m: 0.0045
        close_bucket_max_pos_error_m: 0.0070
        close_bucket_max_ori_error_rad: 0.90
        close_init_q_noise: [0.0025, 0.0050, 0.0075, 0.0050, 0.0035, 0.0035, 0.0025]
        handoff_state_probability: 0.15
        handoff_state_max_orientation_error_rad: 2.00
        handoff_state_max_action_l2: 0.22
      - name: handoff_edge
        min_episodes: 700
        window_episodes: 120
        success_rate_threshold: 0.66
        action_delta_scale: 0.011
        dock_residual_action_limit: 0.11
        dock_delta_q_change_limit_scale: 0.08
        close_bucket_probability: 1.0
        close_bucket_min_pos_error_m: 0.0070
        close_bucket_max_pos_error_m: 0.0100
        close_bucket_max_ori_error_rad: 2.60
        close_init_q_noise: [0.0060, 0.0120, 0.0180, 0.0120, 0.0090, 0.0090, 0.0060]
        handoff_state_probability: 0.30
        handoff_state_max_orientation_error_rad: 2.80
        handoff_state_max_action_l2: 0.24

algorithms:
  td3:
    total_timesteps: 800000
    seed: 7
    learning_rate: 0.00008
    buffer_size: 300000
    learning_starts: 5000
    batch_size: 256
    train_freq: 1
    gradient_steps: 1
    tau: 0.005
    gamma: 0.99
    policy_delay: 2
    target_policy_noise: 0.015
    target_noise_clip: 0.03
    exploration_noise_std: 0.008
