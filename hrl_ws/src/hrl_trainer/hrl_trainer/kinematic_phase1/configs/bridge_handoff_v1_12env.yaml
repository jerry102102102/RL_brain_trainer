env:
  mode: bridge
  episode_length: 24
  action_delta_scale: 0.20
  reward:
    pre_near_goal_pos_threshold_m: 0.030
    near_goal_pos_threshold_m: 0.030
    near_goal_ori_threshold_rad: 10.0
    use_orientation_gate: false
  termination:
    max_episode_steps: 24
    success_pos_threshold_m: 0.008
    success_ori_threshold_rad: 0.08
    success_dwell_steps: 1
    require_orientation: true
    terminate_on_success: true

bridge:
  reset:
    handoff_dataset_path: artifacts/kinematic_phase1/phase1c/handoff_v1/handoff_dataset.jsonl
    max_position_error_m: 0.030
    max_orientation_error_rad: 4.0
    dirty_orientation_min_rad: 1.0
    dirty_motion_min_norm: 0.20
    dirty_orientation_probability: 0.75
    dirty_motion_probability: 0.05
    mixed_dirty_probability: 0.20
    perturb_q_noise: [0.003, 0.003, 0.003, 0.003, 0.003, 0.003, 0.003]
  reward:
    position_keep_radius_m: 0.030
    position_progress_weight: 2.0
    orientation_progress_weight: 4.5
    orientation_reward_requires_position: true
    motion_cleanup_weight: 0.25
    action_magnitude_weight: 0.08
    action_delta_weight: 0.10
    leave_near_goal_penalty: 16.0
    position_regression_weight: 12.0
    orientation_regression_weight: 6.0
    joint_limit_penalty_weight: 0.05
    acceptance_region_bonus: 2.0
    acceptance_pos_threshold_m: 0.008
    acceptance_ori_threshold_rad: 0.08
    success_bonus: 3.0

training:
  checkpoint_freq: 20000
  n_envs: 12
  vec_env: subproc
  start_method: fork
  device: cuda

algorithms:
  ppo:
    total_timesteps: 262144
    seed: 31
    learning_rate: 0.00005
    n_steps: 1024
    batch_size: 256
    n_epochs: 8
    gamma: 0.99
    gae_lambda: 0.95
    clip_range: 0.2
