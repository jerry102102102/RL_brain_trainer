env:
  mode: approach
  n_joints: 7
  action_delta_scale: 0.08
  episode_length: 90
  observation:
    pos_err_scale_m: 1.50
    ori_err_scale_rad: 3.141592653589793
  reward:
    # Kept for checkpoint-compatible env construction. RouteKinematicEnv
    # overrides scalar reward with route.reward below.
    position_progress_weight: 4.0
    orientation_progress_weight: 1.0
    pre_near_goal_pos_threshold_m: 0.12
    near_goal_pos_threshold_m: 0.010
    near_goal_ori_threshold_rad: 0.150
    use_orientation_gate: true
    success_bonus: 0.2
  termination:
    max_episode_steps: 90
    success_pos_threshold_m: 0.010
    success_ori_threshold_rad: 0.150
    success_dwell_steps: 1
    require_orientation: true
    terminate_on_success: true
  curriculum:
    enabled: false

route:
  route_path: artifacts/kinematic_phase1/phase1c/scene_route_curriculum/tray1_holder1_to_8_route_q_dense.json
  init_checkpoint: artifacts/kinematic_phase1/phase1c/approach_scene_route_curriculum_tray1_h1_to_h8_3m_001/model_latest.zip
  reset:
    mode: mixed_prefix_segment
    min_route_index: 1
    max_route_index: 20
    segment_start_index: 1
    segment_end_index: 40
    prefix_start_reset_ratio: 0.05
    random_prefix_reset_ratio: 0.60
    segment_reset_ratio: 0.20
    recovery_reset_ratio: 0.15
    q_noise_std: 0.002
    dq_noise_std: 0.0005
    prev_action_noise_std: 0.02
  curriculum:
    prefix_stages: [20, 40, 80, 120, 180, 260, 360, 483]
    promotion_success_rate: 0.75
    promotion_route_ready_hit_rate: 0.75
    promotion_orientation_hit_rate: 0.75
    promotion_max_regression_rate: 0.25
    promotion_window_episodes: 256
    min_episodes_per_stage: 512
  reward:
    q_goal_progress_weight: 2.0
    ee_position_progress_weight: 7.0
    ee_orientation_progress_weight: 7.0
    route_tangent_progress_weight: 0.30
    same_step_route_ready_bonus: 2.0
    route_ready_dwell_bonus: 0.9
    low_motion_near_waypoint_bonus: 0.5
    orientation_regression_penalty_weight: 5.0
    q_route_regression_penalty_weight: 1.5
    off_route_penalty_weight: 0.20
    action_magnitude_weight: 0.02
    action_delta_weight: 0.03
    dq_penalty_weight: 0.7
    no_progress_penalty: 0.02
    route_ready_pos_threshold_m: 0.010
    route_ready_ori_threshold_rad: 0.150
    # Initial route curriculum uses q-error as a dense shaping signal, not a
    # tight hard gate. The existing checkpoint is pose-trained and must first
    # learn route consistency before q thresholds can be tightened.
    route_ready_q_threshold: 0.500
    route_ready_action_threshold: 1.20
    route_ready_dq_threshold: 0.040

eval:
  suite_seed: 700001
  episodes: 120
  regression_tolerance_m: 0.012

training:
  checkpoint_freq: 250000
  n_envs: 16
  vec_env: subproc
  start_method: fork
  device: cuda

algorithms:
  ppo:
    total_timesteps: 1048576
    seed: 808
    learning_rate: 0.00002
    n_steps: 1024
    batch_size: 512
    n_epochs: 6
    gamma: 0.995
    gae_lambda: 0.95
    clip_range: 0.12
    ent_coef: 0.0005
