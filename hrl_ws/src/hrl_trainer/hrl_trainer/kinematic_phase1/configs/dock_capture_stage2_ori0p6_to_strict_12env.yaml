env:
  mode: dock
  n_joints: 7
  # Stage 2: continue from the 1.0 rad capture policy and specialize the
  # remaining local problem: 0.05-0.6 rad orientation compression plus position
  # retention near the strict docking center.
  action_delta_scale: 0.038
  dock_residual_action_limit: 0.24
  dock_delta_q_change_limit_scale: 0.14
  episode_length: 56
  observation:
    pos_err_scale_m: 0.50
    ori_err_scale_rad: 3.141592653589793

  reward:
    position_progress_weight: 0.0
    orientation_progress_weight: 0.0
    pre_near_goal_pos_threshold_m: 0.025
    near_goal_pos_threshold_m: 0.025
    near_goal_ori_threshold_rad: 3.20
    use_orientation_gate: false

  dock_reward:
    # Position is now a retention constraint and orientation is the main
    # remaining compression objective.
    position_progress_weight: 2.6
    orientation_progress_weight: 6.5
    stay_in_zone_bonus: 0.16
    dwell_bonus: 0.16
    leave_zone_penalty: 0.70
    working_range_bonus: 0.14
    working_range_dwell_bonus: 0.12
    working_range_dwell_start: 2
    working_range_exit_penalty: 0.85
    drift_penalty_position_weight: 16.0
    drift_penalty_orientation_weight: 6.0
    action_magnitude_weight: 0.085
    action_delta_weight: 0.130
    joint_limit_penalty_weight: 0.05
    success_bonus: 4.0

    basin_outer_radius_m: 0.025
    basin_inner_radius_m: 0.012
    basin_dwell_radius_m: 0.006
    basin_outer_bonus: 0.10
    basin_inner_bonus: 0.22
    basin_dwell_bonus: 0.48
    basin_outer_exit_penalty: 0.65
    basin_inner_exit_penalty: 0.90
    basin_dwell_break_penalty: 1.10
    basin_drift_penalty_weight: 22.0

    tight_pose_pos_threshold_m: 0.005
    tight_pose_ori_threshold_rad: 0.05
    tight_pose_bonus: 0.18
    tight_pose_dwell_bonus: 0.36
    strict_pose_leave_penalty: 2.2
    strict_center_reward_weight: 0.85
    strict_center_position_weight: 0.45
    strict_center_orientation_weight: 0.55
    strict_center_small_action_bonus_weight: 0.18
    strict_center_small_action_pos_radius_m: 0.0055
    strict_center_small_action_ori_radius_rad: 0.05
    strict_center_small_action_scale: 0.055
    strict_center_small_action_power: 2.0
    strict_center_dwell_bonus_weight: 0.22
    strict_center_dwell_start: 3
    strict_center_dwell_escalation_start: 6
    strict_center_dwell_escalation_per_step: 0.08
    strict_zone_drift_penalty_multiplier: 2.4
    strict_zone_action_penalty_multiplier: 2.4

    convergence_position_radius_m: 0.020
    convergence_position_progress_weight: 4.5
    convergence_orientation_radius_rad: 0.70
    convergence_orientation_progress_weight: 7.0
    position_first_orientation_pos_threshold_m: 0.0
    position_first_orientation_pre_scale: 1.0

    action_delta_violation_threshold: 0.075
    action_delta_violation_weight: 0.90
    delta_q_change_penalty_threshold: 0.010
    delta_q_change_penalty_weight: 0.90

  dock_reset:
    close_bucket_probability: 1.0
    close_init_q_noise: [0.0160, 0.0800, 0.1100, 0.1100, 0.1200, 0.1800, 0.1200]
    close_bucket_min_pos_error_m: 0.0030
    close_bucket_max_pos_error_m: 0.0180
    close_bucket_min_ori_error_rad: 0.05
    close_bucket_max_ori_error_rad: 0.60
    close_bucket_max_attempts: 2048
    handoff_state_probability: 0.0

  termination:
    max_episode_steps: 56
    success_pos_threshold_m: 0.005
    success_ori_threshold_rad: 0.05
    success_dwell_steps: 5
    require_orientation: true
    terminate_on_success: false

  curriculum:
    enabled: false

eval:
  suite_seed: 700001
  episodes: 100
  regression_tolerance_m: 0.005

training:
  checkpoint_freq: 50000
  n_envs: 12
  vec_env: subproc
  start_method: fork
  device: cuda

algorithms:
  td3:
    total_timesteps: 786432
    seed: 7
    learning_rate: 0.00004
    buffer_size: 400000
    learning_starts: 5000
    batch_size: 256
    train_freq: 1
    gradient_steps: 1
    tau: 0.005
    gamma: 0.99
    policy_delay: 2
    target_policy_noise: 0.012
    target_noise_clip: 0.025
    exploration_noise_std: 0.012
