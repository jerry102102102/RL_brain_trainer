env:
  mode: dock
  n_joints: 7
  action_delta_scale: 0.038
  dock_residual_action_limit: 0.18
  dock_delta_q_change_limit_scale: 0.10
  episode_length: 56
  observation:
    pos_err_scale_m: 0.50
    ori_err_scale_rad: 3.141592653589793

  reward:
    position_progress_weight: 0.0
    orientation_progress_weight: 0.0
    pre_near_goal_pos_threshold_m: 0.025
    near_goal_pos_threshold_m: 0.025
    near_goal_ori_threshold_rad: 3.20
    use_orientation_gate: false

  dock_reward:
    # Keep old finisher shaping, but make hold/preserve the dominant adaptation
    # signal when reset starts from already-good Approach handoff states.
    position_progress_weight: 1.0
    orientation_progress_weight: 1.5
    stay_in_zone_bonus: 0.08
    dwell_bonus: 0.08
    leave_zone_penalty: 0.70
    working_range_bonus: 0.06
    working_range_dwell_bonus: 0.06
    working_range_dwell_start: 2
    working_range_exit_penalty: 0.85
    drift_penalty_position_weight: 10.0
    drift_penalty_orientation_weight: 4.0
    action_magnitude_weight: 0.120
    action_delta_weight: 0.180
    joint_limit_penalty_weight: 0.05
    success_bonus: 1.5

    tight_pose_pos_threshold_m: 0.005
    tight_pose_ori_threshold_rad: 0.05
    tight_pose_bonus: 0.08
    tight_pose_dwell_bonus: 0.14
    strict_pose_leave_penalty: 2.8
    strict_center_reward_weight: 0.45
    strict_center_position_weight: 0.30
    strict_center_orientation_weight: 0.30
    strict_center_small_action_bonus_weight: 0.20
    strict_center_small_action_pos_radius_m: 0.0055
    strict_center_small_action_ori_radius_rad: 0.05
    strict_center_small_action_scale: 0.045
    strict_center_small_action_power: 2.0
    strict_center_dwell_bonus_weight: 0.16
    strict_center_dwell_start: 3
    strict_center_dwell_escalation_start: 6
    strict_center_dwell_escalation_per_step: 0.05
    strict_zone_drift_penalty_multiplier: 2.8
    strict_zone_action_penalty_multiplier: 3.0

    convergence_position_radius_m: 0.012
    convergence_position_progress_weight: 1.6
    convergence_orientation_radius_rad: 0.20
    convergence_orientation_progress_weight: 2.0

    action_delta_violation_threshold: 0.050
    action_delta_violation_weight: 1.20
    delta_q_change_penalty_threshold: 0.006
    delta_q_change_penalty_weight: 1.40

    near_strict_pos_threshold_m: 0.008
    near_strict_ori_threshold_rad: 0.08
    preserve_state_bonus: 0.55
    preserve_position_tolerance_m: 0.0003
    preserve_orientation_tolerance_rad: 0.003
    strict_hold_bonus: 0.42
    low_motion_bonus: 0.35
    low_motion_action_threshold: 0.060
    low_motion_dq_threshold: 0.0015
    tiny_correction_bonus: 0.12
    tiny_correction_action_threshold: 0.060
    worse_than_entry_position_weight: 120.0
    worse_than_entry_orientation_weight: 12.0
    worse_than_entry_position_tolerance_m: 0.0002
    worse_than_entry_orientation_tolerance_rad: 0.002
    near_strict_regression_multiplier: 1.6
    aggressive_action_weight: 0.70
    aggressive_action_threshold: 0.075
    dq_penalty_weight: 40.0
    dq_penalty_threshold: 0.0018
    near_strict_action_penalty_multiplier: 2.5
    near_strict_dq_penalty_multiplier: 2.5

  dock_reset:
    # 60% latest Approach handoff states, 40% original clean/near-strict reset.
    handoff_state_probability: 0.60
    handoff_state_buffer_path: artifacts/kinematic_phase1/phase1c/finisher_handoff_buffer_v2_settle_500/finisher_handoff_state_buffer.json
    handoff_state_max_position_error_m: 0.006
    handoff_state_max_orientation_error_rad: 0.08
    handoff_state_max_action_l2: 0.12
    close_bucket_probability: 1.0
    close_init_q_noise: [0.0160, 0.0800, 0.1100, 0.1100, 0.1200, 0.1800, 0.1200]
    close_bucket_min_pos_error_m: 0.0030
    close_bucket_max_pos_error_m: 0.0180
    close_bucket_min_ori_error_rad: 0.05
    close_bucket_max_ori_error_rad: 0.60
    close_bucket_max_attempts: 2048

  termination:
    max_episode_steps: 56
    success_pos_threshold_m: 0.005
    success_ori_threshold_rad: 0.05
    success_dwell_steps: 5
    require_orientation: true
    terminate_on_success: false

  curriculum:
    enabled: false

eval:
  suite_seed: 700001
  episodes: 100
  regression_tolerance_m: 0.005

training:
  checkpoint_freq: 50000
  n_envs: 12
  vec_env: subproc
  start_method: fork
  device: cuda

algorithms:
  td3:
    total_timesteps: 393216
    seed: 7
    learning_rate: 0.000025
    buffer_size: 400000
    learning_starts: 5000
    batch_size: 256
    train_freq: 1
    gradient_steps: 1
    tau: 0.005
    gamma: 0.99
    policy_delay: 2
    target_policy_noise: 0.006
    target_noise_clip: 0.015
    exploration_noise_std: 0.006
