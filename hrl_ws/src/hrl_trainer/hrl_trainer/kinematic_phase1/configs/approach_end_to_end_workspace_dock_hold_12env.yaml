env:
  mode: approach
  n_joints: 7
  goal_sample_margin_fraction: 0.05
  start_sample_margin_fraction: 0.10
  action_delta_scale: 0.08
  episode_length: 80
  observation:
    pos_err_scale_m: 0.75
    ori_err_scale_rad: 3.141592653589793
  reward:
    # Far-to-dock: keep reach shaping alive far away, then become strict
    # about orientation, low motion, and dwell near the endpoint.
    position_progress_weight: 8.0
    orientation_progress_weight: 0.25
    near_field_orientation_progress_weight: 4.5
    pre_near_goal_pos_threshold_m: 0.08
    near_goal_pos_threshold_m: 0.001
    near_goal_ori_threshold_rad: 0.005
    coarse_orientation_bonus_threshold_rad: 0.020
    use_orientation_gate: true
    pre_near_goal_bonus: 0.02
    near_goal_bonus: 0.02
    near_goal_bonus_decay: 0.45
    coarse_orientation_bonus: 0.03
    dock_coarse_ready_pos_threshold_m: 0.001
    dock_coarse_ready_ori_threshold_rad: 0.005
    dock_coarse_ready_action_threshold: 0.02
    dock_coarse_ready_dq_threshold: 0.0005
    finisher_ready_pos_threshold_m: 0.001
    finisher_ready_ori_threshold_rad: 0.005
    finisher_ready_action_threshold: 0.02
    finisher_ready_dq_threshold: 0.0005
    finisher_ready_bonus: 5.0
    finisher_ready_retention_bonus: 5.0
    finisher_ready_dwell_bonus: 7.0
    finisher_ready_leave_penalty: 6.0
    finisher_ready_regression_weight: 24.0
    near_handoff_pos_threshold_m: 0.006
    near_handoff_ori_threshold_rad: 0.030
    near_handoff_action_weight: 2.5
    near_handoff_dq_weight: 10.0
    near_handoff_motion_bonus_weight: 4.0
    near_handoff_settle_bonus_weight: 4.0
    same_step_alignment_bonus: 0.12
    dwell_bonus: 0.0
    drift_penalty_weight: 3.0
    drift_penalty_escalation_start: 1
    drift_penalty_escalation_per_count: 1.0
    action_magnitude_weight: 0.025
    action_delta_weight: 0.035
    joint_limit_penalty_weight: 0.05
    success_bonus: 0.2
  termination:
    max_episode_steps: 80
    success_pos_threshold_m: 0.001
    success_ori_threshold_rad: 0.005
    success_dwell_steps: 4
    require_orientation: true
    terminate_on_success: false
  curriculum:
    enabled: false
eval:
  suite_seed: 700001
  episodes: 100
  regression_tolerance_m: 0.005
training:
  checkpoint_freq: 50000
  n_envs: 12
  vec_env: subproc
  start_method: fork
  device: cuda
algorithms:
  ppo:
    total_timesteps: 786432
    seed: 7
    learning_rate: 0.00004
    n_steps: 1024
    batch_size: 256
    n_epochs: 5
    gamma: 0.99
    gae_lambda: 0.95
    clip_range: 0.15
