env:
  mode: approach
  n_joints: 7
  goal_sample_margin_fraction: 0.05
  start_sample_margin_fraction: 0.10
  episode_length: 44
  observation:
    pos_err_scale_m: 0.75
    ori_err_scale_rad: 3.141592653589793
  reward:
    position_progress_weight: 7.4
    orientation_progress_weight: 0.75
    near_field_orientation_progress_weight: 5.0
    pre_near_goal_pos_threshold_m: 0.025
    near_goal_pos_threshold_m: 0.012
    near_goal_ori_threshold_rad: 1.80
    coarse_orientation_bonus_threshold_rad: 1.80
    use_orientation_gate: false
    pre_near_goal_bonus: 0.05
    near_goal_bonus: 0.24
    near_goal_bonus_decay: 0.40
    pre_near_to_near_progress_weight: 2.2
    coarse_orientation_bonus: 0.20
    handover_pos_threshold_m: 0.008
    handover_ori_threshold_rad: 1.80
    handover_bonus: 0.26
    handover_dwell_bonus: 0.16
    dwell_bonus: 0.20
    drift_penalty_weight: 3.5
    drift_penalty_escalation_start: 2
    drift_penalty_escalation_per_count: 0.75
    near_goal_leave_penalty: 0.14
    action_magnitude_weight: 0.003
    action_delta_weight: 0.006
    joint_limit_penalty_weight: 0.05
    success_bonus: 1.20
  termination:
    max_episode_steps: 44
    success_pos_threshold_m: 0.008
    success_ori_threshold_rad: 1.80
    success_dwell_steps: 4
    require_orientation: false
    terminate_on_success: true
  curriculum:
    enabled: false

eval:
  suite_seed: 700001
  episodes: 50
  regression_tolerance_m: 0.008

training:
  checkpoint_freq: 20000
  n_envs: 12
  vec_env: subproc
  start_method: fork
  device: cuda

algorithms:
  ppo:
    total_timesteps: 524288
    seed: 7
    learning_rate: 0.000015
    n_steps: 2048
    batch_size: 256
    n_epochs: 10
    gamma: 0.99
    gae_lambda: 0.95
    clip_range: 0.2
