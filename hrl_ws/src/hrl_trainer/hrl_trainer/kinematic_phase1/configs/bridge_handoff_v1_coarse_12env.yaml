env:
  mode: bridge
  episode_length: 32
  action_delta_scale: 0.16
  reward:
    pre_near_goal_pos_threshold_m: 0.030
    near_goal_pos_threshold_m: 0.030
    near_goal_ori_threshold_rad: 10.0
    use_orientation_gate: false
  termination:
    max_episode_steps: 32
    success_pos_threshold_m: 0.030
    success_ori_threshold_rad: 1.50
    success_dwell_steps: 1
    require_orientation: true
    terminate_on_success: true

bridge:
  reset:
    handoff_dataset_path: artifacts/kinematic_phase1/phase1c/handoff_v1/handoff_dataset.jsonl
    max_position_error_m: 0.030
    max_orientation_error_rad: 4.10
    dirty_orientation_min_rad: 1.0
    dirty_motion_min_norm: 0.20
    dirty_orientation_probability: 0.75
    dirty_motion_probability: 0.05
    mixed_dirty_probability: 0.20
    perturb_q_noise: [0.002, 0.002, 0.002, 0.002, 0.002, 0.002, 0.002]
  reward:
    position_keep_radius_m: 0.030
    position_progress_weight: 3.0
    orientation_progress_weight: 7.0
    orientation_reward_requires_position: true
    motion_cleanup_weight: 0.20
    action_magnitude_weight: 0.10
    action_delta_weight: 0.12
    leave_near_goal_penalty: 24.0
    position_regression_weight: 18.0
    orientation_regression_weight: 8.0
    joint_limit_penalty_weight: 0.05
    acceptance_region_bonus: 6.0
    acceptance_pos_threshold_m: 0.030
    acceptance_ori_threshold_rad: 1.50
    success_bonus: 8.0

training:
  checkpoint_freq: 40000
  n_envs: 12
  vec_env: subproc
  start_method: fork
  device: cuda

algorithms:
  ppo:
    total_timesteps: 524288
    seed: 37
    learning_rate: 0.00005
    n_steps: 1024
    batch_size: 256
    n_epochs: 8
    gamma: 0.99
    gae_lambda: 0.95
    clip_range: 0.2
