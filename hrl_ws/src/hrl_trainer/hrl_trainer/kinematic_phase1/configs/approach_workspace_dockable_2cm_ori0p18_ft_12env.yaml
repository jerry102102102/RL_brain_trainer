env:
  mode: approach
  n_joints: 7
  goal_sample_margin_fraction: 0.05
  start_sample_margin_fraction: 0.10
  episode_length: 72
  observation:
    pos_err_scale_m: 0.75
    ori_err_scale_rad: 3.141592653589793
  reward:
    # Keep Approach position-capable, but move the endgame objective toward
    # the state region that the strict Finisher can already accept.
    position_progress_weight: 5.8
    orientation_progress_weight: 1.2
    near_field_orientation_progress_weight: 18.0
    pre_near_goal_pos_threshold_m: 0.045
    near_goal_pos_threshold_m: 0.020
    near_goal_ori_threshold_rad: 0.18
    coarse_orientation_bonus_threshold_rad: 0.18
    orientation_milestone_thresholds_rad: [1.5, 1.0, 0.6, 0.3, 0.18]
    orientation_milestone_bonuses: [0.04, 0.10, 0.22, 0.48, 1.10]
    near_field_orientation_center_weight: 0.055
    use_orientation_gate: false
    pre_near_goal_bonus: 0.04
    near_goal_bonus: 0.12
    near_goal_bonus_decay: 0.45
    pre_near_to_near_progress_weight: 1.8
    coarse_orientation_bonus: 0.60
    handover_pos_threshold_m: 0.020
    handover_ori_threshold_rad: 0.18
    handover_bonus: 1.60
    handover_dwell_bonus: 0.45
    dwell_bonus: 0.08
    drift_penalty_weight: 3.4
    drift_penalty_escalation_start: 2
    drift_penalty_escalation_per_count: 0.70
    near_goal_leave_penalty: 0.18
    action_magnitude_weight: 0.0035
    action_delta_weight: 0.007
    joint_limit_penalty_weight: 0.05
    success_bonus: 2.4
  termination:
    max_episode_steps: 72
    success_pos_threshold_m: 0.020
    success_ori_threshold_rad: 0.18
    success_dwell_steps: 2
    require_orientation: true
    terminate_on_success: true
  curriculum:
    enabled: false

eval:
  suite_seed: 700001
  episodes: 200
  regression_tolerance_m: 0.008

training:
  checkpoint_freq: 200000
  n_envs: 12
  vec_env: subproc
  start_method: fork
  device: cuda

algorithms:
  ppo:
    total_timesteps: 3932160
    seed: 107
    learning_rate: 0.000008
    n_steps: 2048
    batch_size: 256
    n_epochs: 10
    gamma: 0.99
    gae_lambda: 0.95
    clip_range: 0.12
