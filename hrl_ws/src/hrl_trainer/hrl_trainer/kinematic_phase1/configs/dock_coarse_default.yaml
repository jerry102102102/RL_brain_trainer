env:
  mode: dock_coarse
  n_joints: 7
  # Dock-Coarse is a local basin-expansion controller, not the strict finisher.
  # It gets more authority than the final finisher, but less than Approach.
  action_delta_scale: 0.055
  dock_residual_action_limit: 0.35
  dock_delta_q_change_limit_scale: 0.20
  episode_length: 40
  observation:
    pos_err_scale_m: 0.5
    ori_err_scale_rad: 3.141592653589793
  reward:
    position_progress_weight: 0.0
    orientation_progress_weight: 0.0
    pre_near_goal_pos_threshold_m: 0.020
    near_goal_pos_threshold_m: 0.010
    near_goal_ori_threshold_rad: 0.20
    use_orientation_gate: true
  dock_coarse_reward:
    position_progress_weight: 3.5
    orientation_progress_weight: 10.0
    dq_cleanup_weight: 0.8
    action_cleanup_weight: 0.7
    handoff_readiness_progress_weight: 4.0
    finisher_proxy_bonus_weight: 1.4
    handoff_motion_clean_bonus_weight: 1.2
    low_motion_handoff_bonus_weight: 2.0
    settle_bonus_weight: 1.2
    coarse_pos_threshold_m: 0.010
    coarse_ori_threshold_rad: 0.20
    coarse_success_bonus: 0.25
    # Entry is already learnable; this branch now rewards retention and clean handoff.
    coarse_basin_bonus: 0.03
    coarse_retention_bonus: 0.08
    coarse_dwell_bonus: 0.20
    coarse_dwell_start: 2
    strict_like_pos_threshold_m: 0.005
    strict_like_ori_threshold_rad: 0.10
    strict_like_bonus: 0.10
    handoff_ready_pos_threshold_m: 0.010
    handoff_ready_ori_threshold_rad: 0.10
    handoff_ready_dq_threshold: 0.007
    handoff_ready_action_threshold: 0.45
    handoff_ready_bonus: 1.2
    handoff_ready_retention_bonus: 2.4
    handoff_ready_dwell_bonus: 2.2
    finisher_proxy_pos_scale_m: 0.010
    finisher_proxy_ori_scale_rad: 0.10
    finisher_proxy_dq_scale: 0.007
    finisher_proxy_action_scale: 0.45
    working_pos_radius_m: 0.025
    working_ori_radius_rad: 0.35
    working_range_bonus: 0.04
    leave_working_range_penalty: 1.0
    leave_coarse_basin_penalty: 3.0
    leave_handoff_ready_penalty: 7.0
    leave_strict_like_penalty: 2.0
    position_regression_weight: 20.0
    orientation_regression_weight: 11.0
    working_range_regression_multiplier: 1.5
    coarse_basin_regression_multiplier: 3.2
    handoff_ready_regression_multiplier: 4.8
    action_magnitude_weight: 0.22
    action_delta_weight: 0.30
    dq_norm_weight: 0.34
    working_range_smoothness_multiplier: 1.4
    coarse_basin_smoothness_multiplier: 3.0
    handoff_ready_smoothness_multiplier: 6.0
    joint_limit_penalty_weight: 0.05
  dock_reset:
    close_bucket_probability: 1.0
    close_init_q_noise: [0.014, 0.060, 0.090, 0.090, 0.090, 0.140, 0.090]
    close_bucket_min_pos_error_m: 0.005
    close_bucket_max_pos_error_m: 0.020
    close_bucket_min_ori_error_rad: 0.05
    close_bucket_max_ori_error_rad: 0.30
    close_bucket_max_attempts: 2048
  termination:
    max_episode_steps: 40
    success_pos_threshold_m: 0.010
    success_ori_threshold_rad: 0.20
    success_dwell_steps: 2
    require_orientation: true
    terminate_on_success: false
  curriculum:
    enabled: false
eval:
  suite_seed: 700001
  episodes: 50
  regression_tolerance_m: 0.005
training:
  checkpoint_freq: 50000
  n_envs: 12
  vec_env: subproc
  start_method: fork
  device: cuda
algorithms:
  ppo:
    total_timesteps: 786432
    seed: 7
    learning_rate: 0.00025
    n_steps: 1024
    batch_size: 256
    n_epochs: 8
    gamma: 0.98
    gae_lambda: 0.95
    clip_range: 0.2
